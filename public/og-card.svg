<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#09090b"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="600" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2563EB" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#2563EB" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Subtle accent glow -->
  <ellipse cx="300" cy="315" rx="500" ry="350" fill="url(#accent)"/>

  <!-- Top line accent -->
  <rect x="80" y="56" width="60" height="3" rx="1.5" fill="#3B82F6"/>

  <!-- Brand name -->
  <text x="80" y="130" font-family="Inter, Arial, sans-serif" font-weight="900" font-size="58" fill="#ffffff" letter-spacing="3">
    XANT<tspan fill="#3B82F6">.</tspan>
  </text>
  <text x="80" y="164" font-family="Inter, Arial, sans-serif" font-weight="500" font-size="16" fill="#52525b" letter-spacing="5" text-transform="uppercase">DESARROLLO E INGENIERÍA</text>

  <!-- Main headline -->
  <text x="80" y="280" font-family="Inter, Arial, sans-serif" font-weight="800" font-size="52" fill="#ffffff">
    <tspan x="80" dy="0">Soporte técnico y</tspan>
    <tspan x="80" dy="64">soluciones tecnológicas</tspan>
    <tspan x="80" dy="64" fill="#3B82F6">para tu empresa</tspan>
  </text>

  <!-- Bottom info -->
  <text x="80" y="500" font-family="Inter, Arial, sans-serif" font-weight="500" font-size="18" fill="#71717a">
    Ensenada, Baja California, México
  </text>
  <text x="80" y="530" font-family="Inter, Arial, sans-serif" font-weight="500" font-size="16" fill="#52525b">
    Diagnóstico gratuito · Soporte continuo · Desarrollo web
  </text>

  <!-- URL -->
  <text x="80" y="590" font-family="Inter, Arial, sans-serif" font-weight="700" font-size="20" fill="#3B82F6">xant.com.mx</text>

  <!-- Decorative corner element -->
  <rect x="1050" y="56" width="70" height="70" rx="0" fill="none" stroke="#2563EB" stroke-opacity="0.2" stroke-width="2"/>
  <rect x="1050" y="504" width="70" height="70" rx="0" fill="none" stroke="#2563EB" stroke-opacity="0.2" stroke-width="2"/>
</svg>